<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Copiar Script</title></head>
<body style="background:#0F172A;color:white;font-family:sans-serif;padding:40px;text-align:center;">
<h1 style="color:#FFD700">B2B Loterias - Script Teste</h1>
<p style="color:#F59E0B;font-size:1.2rem;">1. Clique no botao verde abaixo<br>2. Va para o site da Caixa (aba anonima)<br>3. F12 → Console → Ctrl+V → Enter</p>
<br>
<button id="btn" onclick="copiar()" style="background:#22C55E;color:white;border:none;padding:24px 60px;border-radius:16px;font-size:1.5rem;font-weight:900;cursor:pointer;">COPIAR SCRIPT</button>
<p id="ok" style="color:#22C55E;font-size:1.5rem;display:none;">COPIADO! Cole no Console F12</p>
<br><br>
<p style="color:#94A3B8;">Ou copie manualmente o texto abaixo:</p>
<textarea id="ta" readonly style="width:90%;height:200px;background:#1E293B;color:#22C55E;border:1px solid #475569;border-radius:8px;padding:12px;font-family:monospace;font-size:0.8rem;"></textarea>
<script>
var S='(async function(){var d=ms=>new Promise(r=>setTimeout(r,ms));console.log("[B2B] Navegando...");try{var inj=angular.element(document.body).injector();var loc=inj.get("$location");var scope=angular.element(document.body).scope();scope.$apply(function(){loc.path("/mega-sena")});console.log("[B2B] Angular OK!")}catch(e){console.log("[B2B] Erro: "+e.message);var ls=document.querySelectorAll("a");for(var i=0;i<ls.length;i++){var h=(ls[i].getAttribute("href")||"");if(h.indexOf("mega-sena")>=0){ls[i].click();break}}}await d(6000);var el=document.getElementById("n01");if(el){console.log("[B2B] SUCESSO!");[1,2,3,4,5,6].forEach(function(n){var b=document.getElementById("n"+String(n).padStart(2,"0"));if(b)b.click()});console.log("[B2B] Numeros clicados!")}else{console.log("[B2B] ERRO: volante nao encontrado. Hash="+window.location.hash)}})()';
document.getElementById("ta").value=S;
function copiar(){try{navigator.clipboard.writeText(S).then(function(){document.getElementById("ok").style.display="block";document.getElementById("btn").textContent="COPIADO!"})}catch(e){document.getElementById("ta").select();document.execCommand("copy");document.getElementById("ok").style.display="block"}}
</script>
</body></html>
